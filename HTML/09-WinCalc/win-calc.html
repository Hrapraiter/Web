<!DOCTYPE html>

<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Калькулятор Windows 11</title>
    <link rel="stylesheet" href="win-calc.css" />
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-img-and-signature">
                <img class="title-bar-icon" src="img/title-bar/icon.png" /><span class="title-text" id="text-title-bar-signature">Калькулятор</span>
            </div>
            <div class="title-bar-buttons">
                <button class="button-base">&#8211;</button>
                <button class="button-base"><div id="btn-maximaze-design"></div></button>
                <button class="button-base" id="btn-close">&#10006;</button>
            </div>
        </div>
        <!-- --------------------------------- -->
        <div class="main-window">
            <div class="edit-title-bar">
                <div class="edit-title-bar-body-left-part">
                    <button class="button-base">&#8801;</button>
                    <span class="title-text" id="text-main-title-bar-signature">Обычный</span>
                    <buton class="button-base" id="btn-scale-window"><img class="rect-img" src="img/main-window/scale.png"/></buton>
                </div>
                <div class="edit-title-bar-body-right-part">
                    <button class="button-base" id="btn-history"><img class="rect-img" src="img/main-window/history.png"/></button>
                </div>
            </div>
            <div class="edit-line-box">
                <div class="edit-line">0</div>
                <div class="control-box">
                    <button class="button-base disable">MC</button>
                    <button class="button-base disable">MR</button>
                    <button class="button-base enable">M+</button>
                    <button class="button-base enable">M-</button>
                    <button class="button-base enable">MS</button>
                    <button class="button-base disable">M&#709;</button>
                </div>
            </div>
            <div class="divide"></div>
            <div class="user-control-box">
                <div class="user-control-box-line"><!-- 1 -->
                    <button class="button-base" middle-gray>%</button>
                    <button class="button-base" middle-gray>CE</button>
                    <button class="button-base" middle-gray>C</button>
                    <!--<button class="button-base" middle-gray><img class="rect-img" style="--size:15px;--width:21px;--height:17px" src="img/main-window/backspace.png" /></button>-->
                    <button class="button-base" id="btn-backspace" middle-gray><img class="rect-img" src="img/main-window/backspace.png" /></button>
                </div>
                <div class="user-control-box-line">
                    <!-- 2 -->
                    <button class="button-base" id="btn-one-part-from-parts" middle-gray><img class="rect-img" src="img/main-window/one-part-from-parts.png" /></button>
                    <button class="button-base" id="btn-pow" middle-gray><img class="rect-img" src="img/main-window/pow.png" /></button>
                    <button class="button-base" id="btn-sqrt" middle-gray><img class="rect-img" src="img/main-window/sqrt.png" /></button>
                    <button class="button-base" middle-gray>
                        <div id="btn-divide-design">
                            <span id="divide">&#160;:</span>
                            <span id="minus">&#8211;</span>
                        </div>
                    </button>
                </div>
                <div class="user-control-box-line"><!-- 3 -->
                    <button class="button-base" light-gray>7</button>
                    <button class="button-base" light-gray>8</button>
                    <button class="button-base" light-gray>9</button>
                    <button class="button-base" middle-gray>x</button>
                </div>
                <div class="user-control-box-line"><!-- 4 -->
                    <button class="button-base" light-gray>4</button>
                    <button class="button-base" light-gray>5</button>
                    <button class="button-base" light-gray>6</button>
                    <button class="button-base" middle-gray>&#8211;</button>
                </div>
                <div class="user-control-box-line"><!-- 5 -->
                    <button class="button-base" light-gray>1</button>
                    <button class="button-base" light-gray>2</button>
                    <button class="button-base" light-gray>3</button>
                    <button class="button-base" middle-gray>+</button>
                </div>
                <div class="user-control-box-line"><!-- 6 -->
                    <button class="button-base" id="btn-inverse" light-gray><img class="rect-img" src="img/main-window/inverse.png" /></button>
                    <button class="button-base" light-gray>0</button>
                    <button class="button-base" light-gray>,</button>
                    <button class="button-base" cyan>&#9552;</button>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
