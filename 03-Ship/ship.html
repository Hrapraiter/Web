<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="../BigCat.ico"/>
    <title>Ship</title>
    <style>
        table
        {
            border-collapse:collapse;
        }
        tbody th ,tbody  td
        {
            border:solid 2px;
        }
        th, td 
        {
            padding: 8px 16px;
        }
        .sun        {background-color:yellow        }
        .sky        {background-color:aqua          }
        .light_wood {background-color:coral         }
        .wood       {background-color:saddlebrown   }
        .water      {background-color:blue          }
        .flag       {background-color:red           }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th></th>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th class="sun" colspan="4"></th>
                <td class="sky"></td>
                <td class="light_wood" rowspan="9"></td>
                <td class="flag"></td>
                <td class="sky" colspan="7"></td>
            </tr>
            <tr>
                <th class="sun" colspan="3"></th>
                <td class="sky" colspan="2"></td>
                <td class="flag" colspan="2"></td>
                <td class="sky" colspan="6"></td>
            </tr>
            <tr>
                <th class="sun" colspan="2"></th>
                <td class="sky" colspan="3"></td>
                <td class="flag" colspan="3"></td>
                <td class="sky" colspan="5"></td>
            </tr>
            <tr>
                <th class="sun"></th>
                <td class="sky" colspan="4"></td>
                <td class="flag" colspan="4"></td>
                <td class="sky" colspan="4"></td>
            </tr>
            <tr>
                <th class="sky" colspan="5"></th>
                <td class="flag" colspan="5"></td>
                <td class="sky" colspan="3"></td>
            </tr>
            <tr>
                <th class="sky" colspan="5"></th>
                <td class="flag" colspan="6"></td>
                <td class="sky" colspan="2"></td>
            </tr>
            <tr>
                <th class="sky" colspan="5"></th>
                <td class="flag" colspan="7"></td>
                <td class="sky"></td>
            </tr>
            <tr>
                <th class="sky" colspan="5"></th>
                <td class="flag" colspan="8"></td>
            </tr>
            <tr>
                <th class="sky" colspan="5"></th>
                <td class="sky" colspan="8"></td>
            </tr>
            <tr>
                <th class="sky"></th>
                <td class="light_wood" colspan="12"></td>
                <td class="sky"></td>
            </tr>
            <tr>
                <th class="wood"></th>
                <td class="wood" rowspan="2"></td>
                <td class="wood" rowspan="3"></td>
                <td class="wood" rowspan="4"></td>

                <td class="wood" rowspan="5"></td>
                <td class="wood" rowspan="5"></td>
                <td class="wood" rowspan="5"></td>
                <td class="wood" rowspan="5"></td>
                <td class="wood" rowspan="5"></td>
                <td class="wood" rowspan="5"></td>

                <td class="wood" rowspan="4"></td>
                <td class="wood" rowspan="3"></td>
                <td class="wood" rowspan="2"></td>
                <td class="wood"></td>
            </tr>
            <tr>
                <th class="water"></th>
                <td class="water"></td>
            </tr>
            <tr>
                <th class="water" colspan="2"></th>
                <td class="water" colspan="2"></td>
            </tr>
            <tr>
                <th class="water" colspan="3"></th>
                <td class="water" colspan="3"></td>
            </tr>
            <tr>
                <th class="water" colspan="4"></th>
                <td class="water" colspan="4"></td>
            </tr>
            <tr>
                <th class="water" colspan="5"></th>
                <td class="wood" colspan="4" rowspan="2"></td>
                <td class="water" colspan="5"></td>
            </tr>
            <tr>
                <th class="water" colspan="5"></th>
                <td class="water" colspan="5"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
