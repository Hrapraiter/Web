        <div>
            <label for="factorial-number">Введите число для вычисления факториала:</label>
            <input id="factorial-number" type="number" />
            <div id="factorial-result"></div>
            <button onclick="Factorial()">Вычислить</button>
        </div>
        <div>
            <label for="fibonacci-limit">Введите предел ряда Фибоначчи:</label>

    <script>
    function Factorial()
    {
        let factorial_number = document.getElementById("factorial-number");// получаем элемент страницы в который пользователь вводит значение.
        let n = factorial_number.value;
        let f = BigInt(1);
        document.getElementById("factorial-result").innerHTML = "";
        for (let i = 1n; i <= n; i++)
        {
            f *= i;
            document.getElementById("factorial-result").innerHTML += `${i}! = ${f}; <br>`;
        }
        document.getElementById("factorial-result").innerHTML += `<h3>${n}! = ${f}</h3>`;
    }
    function Fibonacсi()
    {
        let n = document.getElementById("fibonacci-limit").value;
        for (let a = 0, b = 1, c = a + b; a <= n; c = (a = b) + (b = c))
        {
            document.getElementById("fibonacci-sequence").innerHTML += `${a}\t`;
        }
    }
